name: Upstream Sync

on:
  schedule:
    - cron: "0 6 * * *"  # daily at 06:00 UTC
  workflow_dispatch:       # allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fast-forward ouroboros-stable from upstream main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/razzant/ouroboros.git || true
          git fetch upstream main

          # Create or update ouroboros-stable branch
          if git rev-parse --verify origin/ouroboros-stable >/dev/null 2>&1; then
            git checkout ouroboros-stable
          else
            git checkout -b ouroboros-stable upstream/main
          fi

          # Fast-forward only — fail if diverged
          git merge --ff-only upstream/main

          git push origin ouroboros-stable
