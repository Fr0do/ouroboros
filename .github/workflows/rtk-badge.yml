name: RTK Badge

on:
  push:
    paths:
      - '.github/rtk-badge.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read badge data
        id: badge
        run: |
          MSG=$(jq -r '.message' .github/rtk-badge.json)
          COLOR=$(jq -r '.color' .github/rtk-badge.json)
          echo "message=$MSG" >> "$GITHUB_OUTPUT"
          echo "color=$COLOR" >> "$GITHUB_OUTPUT"

      - name: Create badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.RTK_BADGE_GIST_ID }}
          filename: rtk-savings.json
          label: RTK savings
          message: ${{ steps.badge.outputs.message }}
          color: ${{ steps.badge.outputs.color }}
