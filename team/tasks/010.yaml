title: "Team summary report generator"
project: ouroboros
priority: low
context: |
  Per LEADER.md, when all tasks complete the leader writes team/results/SUMMARY.md.
  Automate this with a function and a /team summary command.

  1. In bot/services/team.py add:
     - generate_summary() -> str: reads all task files and result files, produces a markdown report
     - Format:
       ```
       # Team Session Summary

       ## Completed (N/M)
       - ✅ 001: Title — completed at <time>
       - ✅ 002: Title — completed at <time>

       ## Failed
       - ❌ 003: Title — reason

       ## Still Pending
       - ⏳ 004: Title

       ## Files Modified
       (aggregate from all result files)

       ## Notes
       (aggregate notes from all result files)
       ```

  2. In bot/handlers/team.py add /team summary subcommand:
     - Calls generate_summary()
     - Sends result via send_long
     - Also writes to team/results/SUMMARY.md

  3. The leader (this terminal) can call /team summary from Telegram to get the final report.

  Files to modify:
  - bot/services/team.py (add generate_summary)
  - bot/handlers/team.py (add summary subcommand)

  Acceptance:
  - /team summary produces a readable markdown report
  - Report includes all tasks with their status
  - Aggregates file modifications and notes from result files
  - Writes SUMMARY.md to team/results/
