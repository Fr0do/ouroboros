title: "SSH error handling wrapper for handlers"
project: ouroboros
priority: normal
context: |
  Multiple bot handlers call SSH and can fail silently or crash.
  Add a consistent error handling pattern.

  Current problem:
  - ssh_exec can return empty string or raise exceptions
  - Handlers like /status, /gpu, /logs don't handle SSH failures gracefully
  - User sees cryptic errors or empty messages

  Implementation:
  1. In bot/services/ssh.py, add a wrapper or modify ssh_exec to:
     - Return a clear error message on timeout (not empty string)
     - Return a clear error message on connection refused
     - Log the error with logger

  2. In bot/services/tg.py, add a decorator:
     ```python
     def ssh_error_handler(func):
         """Decorator that catches SSH errors and sends user-friendly messages."""
         async def wrapper(update, context):
             try:
                 return await func(update, context)
             except Exception as e:
                 await update.message.reply_text(f"⚠️ Error: {e}")
                 logger.error(f"Handler {func.__name__} failed: {e}")
         return wrapper
     ```

  3. Apply the decorator to SSH-dependent handlers:
     - status.py, logs.py, run.py, stop.py, ckpt.py, metrics.py, crashlog.py, sync.py

  Read each handler file first to understand the current error handling before modifying.

  Files to modify:
  - bot/services/tg.py (add decorator)
  - bot/services/ssh.py (improve error returns)
  - bot/handlers/{status,logs,run,stop,ckpt,metrics,crashlog,sync}.py (apply decorator)

  Acceptance:
  - SSH failures produce user-friendly Telegram messages instead of crashes
  - All errors logged with handler name
  - Existing functionality unchanged when SSH works normally
