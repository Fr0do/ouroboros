title: "Team stale-claim detection + auto-report"
project: ouroboros
priority: normal
context: |
  Add stale claim detection to the team service and a Telegram watchdog.

  Per team/config.yaml, claim_stale_minutes=10. A task is stale if:
  - status == "claimed"
  - It has been claimed for longer than claim_stale_minutes
  - We track this by adding a "claimed_at" timestamp when status changes to "claimed"

  Implementation:
  1. In bot/services/team.py:
     - Add get_stale_tasks(stale_minutes=10) -> list[dict]: returns tasks that are claimed but stale
     - Load config from team/config.yaml to get claim_stale_minutes
     - For each claimed task, check if "claimed_at" field exists and is older than threshold
     - Workers should set "claimed_at" when claiming (update WORKER.md to mention this)

  2. In bot/handlers/team.py:
     - Add /team stale subcommand: shows stale tasks with how long they've been stuck
     - In the default /team list view, mark stale tasks with a ⚠️ icon

  3. In team/WORKER.md:
     - Add instruction: when claiming a task, also set claimed_at to current ISO timestamp

  Files to modify:
  - bot/services/team.py
  - bot/handlers/team.py
  - team/WORKER.md

  Acceptance:
  - /team stale shows stale tasks (or "No stale tasks")
  - Stale tasks show ⚠️ in /team list
  - WORKER.md updated with claimed_at instruction
