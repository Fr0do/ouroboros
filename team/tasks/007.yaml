context: |
  Add a /health Telegram command that does a quick connectivity check of all remotes.

  Usage: /health
  Output example:
    🟢 kurkin-1 — 45ms
    🟢 kurkin-4 — 52ms
    Bot uptime: 3h 12m

  Implementation:
  1. Create bot/handlers/health.py:
     - For each unique host in PROJECTS config, run ssh_exec(host, "echo ok", timeout=10)
     - Measure round-trip time
     - Show green/red status per host
     - Show bot uptime (time since module import or app start)

  2. In bot/main.py:
     - Import and register the health handler
     - Add to /start help text
     - Add BotCommand("health", "Check remote connectivity")

  3. For uptime tracking, add a module-level variable in bot/main.py:
     ```python
     import time
     _START_TIME = time.monotonic()
     ```
     And expose it for the health handler to read.
     Or simpler: put _START_TIME in bot/services/config.py so health.py can import it.

  Files to create:
  - bot/handlers/health.py

  Files to modify:
  - bot/main.py (register handler, add to help)
  - bot/services/config.py (add _START_TIME)

  Acceptance:
  - /health shows connectivity status for all remotes
  - Shows response time in ms
  - Shows bot uptime
  - Red indicator for unreachable hosts (not a crash)
