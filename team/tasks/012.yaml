context: |
  Create a Claude Code custom slash command (skill) that shows agent evolution vital stats
  directly in the terminal, without needing Telegram.

  ## Skill file

  Create .claude/commands/vitals.md with a prompt that instructs Claude to:

  1. Gather the same data as bot/services/vitals.py but by running shell commands directly:
     - `git log --oneline --since="30 days ago" | wc -l` for commit count
     - `git log --since="30 days ago" --format="%ad" --date=short | sort | uniq -c` for daily breakdown
     - `git diff --stat $(git log --since="30 days ago" --format="%H" | tail -1)..HEAD` for LOC changes
     - Parse team/tasks/*.yaml for task queue stats (use grep/read)
     - `find bot -name "*.py" | wc -l` and line counts for codebase size
     - `gh issue list --state all --json state` for GitHub issues
     - `git log --format="%ad" --date=short | tail -1` for project birthday

  2. Present results as a formatted terminal dashboard:
     ```
     ╔══════════════════════════════════════╗
     ║     OUROBOROS VITAL STATS            ║
     ╠══════════════════════════════════════╣
     ║ 🗓  Project age:     12 days         ║
     ║ 📊 Total commits:   47              ║
     ║ 📝 Codebase:        1,234 LOC       ║
     ║                     23 .py files     ║
     ╠──────────────────────────────────────╣
     ║ 🏗  Team Tasks                       ║
     ║    Done: 3  Pending: 7  Failed: 0    ║
     ║    Completion: 30%                   ║
     ╠──────────────────────────────────────╣
     ║ 🐙 GitHub                            ║
     ║    Issues: 5 open, 18 closed         ║
     ╠──────────────────────────────────────╣
     ║ 📈 Last 30 days activity             ║
     ║    (sparkline or mini bar chart)     ║
     ╚══════════════════════════════════════╝
     ```

  3. Use Unicode box-drawing characters for the frame
  4. Include a mini sparkline or text bar chart for daily commit activity
  5. Add a one-line "health verdict" at the bottom (e.g., "Healthy — steady commit pace, tasks progressing")

  ## Skill file format

  The file .claude/commands/vitals.md should be a markdown prompt. Example structure:

  ```markdown
  Collect and display vital statistics for the ouroboros agent system.

  Run the following commands to gather data, then format a terminal dashboard:

  [detailed instructions as above]

  Display the dashboard using Unicode box-drawing characters. Keep it compact and readable.
  ```

  ## Acceptance
  - `.claude/commands/vitals.md` exists and is a valid skill prompt
  - Running `/vitals` in Claude Code shows a formatted terminal dashboard
  - Dashboard includes: project age, commit count, LOC, team task stats, GitHub issues, activity chart
  - Works without any Python dependencies (pure shell commands + Claude formatting)
