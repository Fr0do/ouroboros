context: |
  Write an integration test that exercises the full team task lifecycle:
  pending → claimed → done, and pending → claimed → failed.

  This tests the actual file-based protocol that workers use.

  Create tests/test_team_integration.py:

  Test 1: Full lifecycle
  - Create a task YAML in a tmp dir (monkeypatch TASKS_DIR)
  - Verify load_tasks returns it as pending
  - Simulate claiming: update status to claimed, set claimed_by and claimed_at
  - Save, reload, verify claimed status
  - Create a result file in tmp results dir (monkeypatch RESULTS_DIR)
  - Update task to done with result_file path
  - Save, reload, verify done status

  Test 2: Failed task
  - Create pending task
  - Claim it
  - Set status to failed
  - Verify load_tasks returns it as failed

  Test 3: Dependencies
  - Create task A (pending, no deps) and task B (pending, depends_on: ["A"])
  - Verify that a helper function can check if deps are satisfied
  - Add check_dependencies(task) -> bool to bot/services/team.py if not exists
  - Returns True only if all depends_on tasks have status "done"

  Test 4: Auto-increment IDs
  - If create_task from task 004 exists, test that it auto-increments correctly
  - If not, skip this test (mark with pytest.mark.skipif or try/except ImportError)

  Files to create:
  - tests/test_team_integration.py

  Files to modify:
  - bot/services/team.py (add check_dependencies if needed)

  Acceptance:
  - All integration tests pass
  - Tests use real filesystem (tmp_path), not mocks
  - Full lifecycle tested end-to-end
