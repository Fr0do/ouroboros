# Team configuration
# team_size: number of Claude Code terminals (1 leader + N-1 workers)
team_size: 3

# Leader model (planning, architecture, code review)
leader:
  model: opus
  role: "Plan, decompose, review, decide. Never implement directly."

# Worker model (implementation, execution)
worker:
  model: sonnet
  role: "Implement tasks from team/tasks/. Write code, run tests, report results."

# Task assignment strategy
# round_robin: distribute evenly
# affinity: assign by project expertise
# manual: leader assigns explicitly
strategy: manual

# Project-worker affinity (used when strategy=affinity)
affinity:
  s_cot: [1, 2]
  ouroboros: [1]
  long-vqa: [2]

# Timeouts
task_timeout_minutes: 30
claim_stale_minutes: 10
